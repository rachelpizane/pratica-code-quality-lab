name: Java CI with Maven (Checkstyle & Spotless)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório para a máquina do GitHub
      - uses: actions/checkout@v4

      # 2. Instala o JDK (Java Development Kit)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Isso faz com que o GitHub guarde as dependências do projeto. Na segunda vez que o CI rodar, ele será muito mais rápido porque não vai precisar baixar a internet inteira

      # 3. Verifica a formatação com o Spotless
      - name: Run Spotless Check
        run: mvn spotless:check

      # 4. Verifica regras de estilo com Checkstyle
      - name: Run Checkstyle
        run: mvn checkstyle:check

      # 5. Compila e roda os testes unitários
      - name: Build with Maven
        run: mvn clean install
